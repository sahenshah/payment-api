name: CD
on:
  workflow_dispatch:  # manual trigger only
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Get runner IP
        id: ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)/32" >> $GITHUB_OUTPUT

      - name: Get EC2 public IP
        id: host
        run: |
          echo "host=$(aws ec2 describe-instances --instance-ids i-02d8b51e04a18ef91 \
            --query 'Reservations[].Instances[].PublicIpAddress' --output text)" >> $GITHUB_OUTPUT

      - name: Allow runner IP for SSH
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id sg-0af06276d2e8dc9cb --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}

      - name: Deploy to EC2
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.host.outputs.host }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
            docker stop payment-api || true
            docker rm payment-api || true
            docker run -d \
              --name payment-api \
              -p 8000:8000 \
              --env-file /home/ec2-user/payment-api/.env \
              ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Revoke runner IP from SSH
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id sg-0af06276d2e8dc9cb --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}